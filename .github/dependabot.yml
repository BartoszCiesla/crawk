version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build(deps): "
    labels:
      - "dependencies"
      - "github-actions"
    cooldown:
      default-days: 7
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build(deps): "
    labels:
      - "dependencies"
      - "rust"
    groups:
      patch-minor:
        update-types:
          - "minor"
          - "patch"
      major:
        update-types:
          - "major"
    cooldown:
      default-days: 7
      semver-patch-days: 3
      semver-minor-days: 5
      semver-major-days: 14

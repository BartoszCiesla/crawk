name: Coverage
on:
  push:
    branches:
      - master
permissions: {}
jobs:
  coverage:
    name: Coverage
    permissions:
      contents: read # For checking the code in the repository.
    runs-on: ubuntu-latest
    environment: codecov
    concurrency:
      group: coverage-${{ github.ref }}
      cancel-in-progress: false
    if: ${{ github.repository_owner == 'BartoszCiesla' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: llvm-tools-preview
      - name: Install cargo tools
        uses: taiki-e/install-action@50b4a718b59c718df4ef27a3b445f86cd57b9f00 # v2.80.0
        with:
          tool: cargo-llvm-cov, cargo-nextest
      - name: Generate coverage
        run: cargo llvm-cov nextest --cargo-profile fast-build --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

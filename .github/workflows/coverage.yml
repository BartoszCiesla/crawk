name: Coverage
on:
  push:
    branches:
      - master
permissions: {}
jobs:
  coverage:
    name: Coverage
    permissions:
      contents: read # For checking the code in the repository.
    runs-on: ubuntu-latest
    environment: codecov
    concurrency:
      group: coverage-${{ github.ref }}
      cancel-in-progress: false
    if: ${{ github.repository_owner == 'BartoszCiesla' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: llvm-tools-preview
      - name: Install cargo tools
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cargo-llvm-cov, cargo-nextest
      - name: Generate coverage
        run: cargo llvm-cov nextest --cargo-profile fast-build --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

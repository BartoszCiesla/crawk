name: Coverage
on:
  push:
    branches:
      - master
permissions: {}
jobs:
  coverage:
    name: Coverage
    permissions:
      contents: read # For checking the code in the repository.
    runs-on: ubuntu-latest
    environment: codecov
    concurrency:
      group: coverage-${{ github.ref }}
      cancel-in-progress: false
    if: ${{ github.repository_owner == 'BartoszCiesla' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: llvm-tools-preview
      - name: Install cargo tools
        uses: taiki-e/install-action@56545b37b57562edd73171cb6c62cc509db4c34e # v2.81.7
        with:
          tool: cargo-llvm-cov, cargo-nextest
      - name: Generate coverage
        run: cargo llvm-cov nextest --cargo-profile fast-build --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

name: Checks
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
permissions: {}
jobs:
  prek-checks:
    name: Prek Checks
    permissions:
      contents: read # For checking the code in the repository.
    runs-on: ubuntu-latest
    concurrency:
      group: prek-checks-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          components: clippy, rustfmt
      - name: Install cargo tools
        uses: taiki-e/install-action@7bc99eee1f1b8902a125006cf790a1f4c8461e63 # 2.69.8
        with:
          tool: cargo-sort, cargo-machete, cargo-sort, cargo-nextest
      - name: Run checks
        uses: j178/prek-action@79f765515bd648eb4d6bb1b17277b7cb22cb6468 # v2.0.0
        with:
          extra-args: '--all-files'
  finalize:
    name: Finalize Checks
    runs-on: ubuntu-latest
    concurrency:
      group: finalize-${{ github.ref }}
      cancel-in-progress: false
    needs:
      - prek-checks
    if: always()
    steps:
      - name: Exit with appropriate code
        env:
          CHECKS_FAILED: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          if [ "$CHECKS_FAILED" = "true" ]; then
            echo "❌ Some checks failed or were cancelled"
            exit 1
          else
            echo "✅ All checks passed successfully"
            exit 0
          fi

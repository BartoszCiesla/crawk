name: Checks
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
permissions: {}
jobs:
  prek-checks-pr:
    name: Prek Checks (PR)
    if: github.event_name == 'pull_request'
    permissions:
      contents: read # For checking the code in the repository.
    runs-on: ubuntu-latest
    concurrency:
      group: prek-checks-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0 # Full history needed for base..head diff.
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: clippy, rustfmt
      - name: Install cargo tools
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cargo-sort, cargo-machete, cargo-sort, cargo-nextest, cargo-deny
      - name: Run pre-commit checks
        uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2.0.4
        with:
          extra-args: '--hook-stage pre-commit --from-ref ${{ github.event.pull_request.base.sha }} --to-ref ${{ github.event.pull_request.head.sha }}'
      - name: Run pre-push checks
        uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2.0.4
        with:
          extra-args: '--hook-stage pre-push --from-ref ${{ github.event.pull_request.base.sha }} --to-ref ${{ github.event.pull_request.head.sha }}'
  prek-checks-push:
    name: Prek Checks (Push)
    if: github.event_name == 'push'
    permissions:
      contents: read # For checking the code in the repository.
    runs-on: ubuntu-latest
    concurrency:
      group: prek-checks-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: clippy, rustfmt
      - name: Install cargo tools
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cargo-sort, cargo-machete, cargo-sort, cargo-nextest, cargo-deny
      - name: Run pre-commit checks
        uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2.0.4
        with:
          extra-args: '--hook-stage pre-commit --all-files'
      - name: Run pre-push checks
        uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2.0.4
        with:
          extra-args: '--hook-stage pre-push --all-files'
  build-checks:
    name: Build Checks
    permissions:
      contents: read
    runs-on: ubuntu-latest
    concurrency:
      group: build-checks-${{ github.ref }}-${{ matrix.target }}
      cancel-in-progress: false
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          target: ${{ matrix.target }}
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools
      - name: Build
        run: cargo build --target "${TARGET}"
        env:
          TARGET: ${{ matrix.target }}
      - name: Test
        run: cargo test --target "${TARGET}"
        env:
          TARGET: ${{ matrix.target }}
          RUST_BACKTRACE: "0"
  finalize:
    name: Finalize Checks
    runs-on: ubuntu-latest
    concurrency:
      group: finalize-${{ github.ref }}
      cancel-in-progress: false
    needs:
      - prek-checks-pr
      - prek-checks-push
      - build-checks
    if: always()
    steps:
      - name: Exit with appropriate code
        env:
          CHECKS_FAILED: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          if [ "$CHECKS_FAILED" = "true" ]; then
            echo "❌ Some checks failed or were cancelled"
            exit 1
          else
            echo "✅ All checks passed successfully"
            exit 0
          fi

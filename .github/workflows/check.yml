name: Checks
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
permissions: {}
jobs:
  prek-checks:
    name: Prek Checks
    permissions:
      contents: read # For checking the code in the repository.
    runs-on: ubuntu-latest
    concurrency:
      group: prek-checks-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          components: clippy, rustfmt
      - name: Install cargo tools
        uses: taiki-e/install-action@0abfcd587b70a713fdaa7fb502c885e2112acb15 # v2.75.7
        with:
          tool: cargo-sort, cargo-machete, cargo-sort, cargo-nextest
      - name: Run checks
        uses: j178/prek-action@cbc2f23eb5539cf20d82d1aabd0d0ecbcc56f4e3 # v2.0.2
        with:
          extra-args: '--all-files'
  build-checks:
    name: Build Checks
    permissions:
      contents: read
    runs-on: ubuntu-latest
    concurrency:
      group: build-checks-${{ github.ref }}-${{ matrix.target }}
      cancel-in-progress: false
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          target: ${{ matrix.target }}
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools
      - name: Build
        run: cargo build --target "${TARGET}"
        env:
          TARGET: ${{ matrix.target }}
      - name: Test
        run: cargo test --target "${TARGET}"
        env:
          TARGET: ${{ matrix.target }}
          RUST_BACKTRACE: "0"
  finalize:
    name: Finalize Checks
    runs-on: ubuntu-latest
    concurrency:
      group: finalize-${{ github.ref }}
      cancel-in-progress: false
    needs:
      - prek-checks
      - build-checks
    if: always()
    steps:
      - name: Exit with appropriate code
        env:
          CHECKS_FAILED: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          if [ "$CHECKS_FAILED" = "true" ]; then
            echo "❌ Some checks failed or were cancelled"
            exit 1
          else
            echo "✅ All checks passed successfully"
            exit 0
          fi

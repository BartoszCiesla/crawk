name: Checks
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
permissions: {}
jobs:
  prek-checks:
    name: Prek Checks
    permissions:
      contents: read # For checking the code in the repository.
    runs-on: ubuntu-latest
    concurrency:
      group: prek-checks-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
        with:
          components: clippy, rustfmt
      - name: Install cargo tools
        uses: taiki-e/install-action@ec28e287910af896fd98e04056d31fa68607e7ad # v2.77.4
        with:
          tool: cargo-sort, cargo-machete, cargo-sort, cargo-nextest, cargo-deny
      - name: Run pre-commit checks (PR - changed files only)
        if: github.event_name == 'pull_request'
        uses: j178/prek-action@6ad80277337ad479fe43bd70701c3f7f8aa74db3 # v2.0.3
        with:
          extra-args: '--hook-stage pre-commit --from-ref ${{ github.event.pull_request.base.sha }} --to-ref ${{ github.event.pull_request.head.sha }} --show-diff-on-failure'
      - name: Run pre-push checks (PR - changed files only)
        if: github.event_name == 'pull_request'
        uses: j178/prek-action@6ad80277337ad479fe43bd70701c3f7f8aa74db3 # v2.0.3
        with:
          extra-args: '--hook-stage pre-push --from-ref ${{ github.event.pull_request.base.sha }} --to-ref ${{ github.event.pull_request.head.sha }} --show-diff-on-failure'
      - name: Run pre-commit checks (push - all files)
        if: github.event_name == 'push'
        uses: j178/prek-action@6ad80277337ad479fe43bd70701c3f7f8aa74db3 # v2.0.3
        with:
          extra-args: '--hook-stage pre-commit --all-files --show-diff-on-failure'
      - name: Run pre-push checks (push - all files)
        if: github.event_name == 'push'
        uses: j178/prek-action@6ad80277337ad479fe43bd70701c3f7f8aa74db3 # v2.0.3
        with:
          extra-args: '--hook-stage pre-push --all-files --show-diff-on-failure'
  build-checks:
    name: Build Checks
    permissions:
      contents: read
    runs-on: ubuntu-latest
    concurrency:
      group: build-checks-${{ github.ref }}-${{ matrix.target }}
      cancel-in-progress: false
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
        with:
          target: ${{ matrix.target }}
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools
      - name: Build
        run: cargo build --target "${TARGET}"
        env:
          TARGET: ${{ matrix.target }}
      - name: Test
        run: cargo test --target "${TARGET}"
        env:
          TARGET: ${{ matrix.target }}
          RUST_BACKTRACE: "0"
  finalize:
    name: Finalize Checks
    runs-on: ubuntu-latest
    concurrency:
      group: finalize-${{ github.ref }}
      cancel-in-progress: false
    needs:
      - prek-checks
      - build-checks
    if: always()
    steps:
      - name: Exit with appropriate code
        env:
          CHECKS_FAILED: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          if [ "$CHECKS_FAILED" = "true" ]; then
            echo "❌ Some checks failed or were cancelled"
            exit 1
          else
            echo "✅ All checks passed successfully"
            exit 0
          fi

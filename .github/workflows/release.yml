name: Release
on:
  push:
    branches:
      - master
permissions: {}
jobs:
  # Release unpublished packages.
  release-plz-release:
    name: Release
    permissions:
      pull-requests: write # For creating the release PR with the new versions and changelog.
      contents: write # For pushing the release commit with the new versions and changelog, which is required for creating the release PR.
      id-token: write # For authenticating with the cargo registry when publishing the packages.
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-release-${{ github.ref }}
      cancel-in-progress: false
    if: ${{ github.repository_owner == 'BartoszCiesla' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1.15.3
      - name: Run release-plz
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5.156
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
  # Create a PR with the new versions and changelog, preparing the next release.
  release-plz-pr:
    name: Pull Request
    permissions:
      pull-requests: write # For creating the release PR with the new versions and changelog.
      contents: write # For pushing the release commit with the new versions and changelog, which is required for creating the release PR.
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'BartoszCiesla' }}
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }} # For pushing the release branch back to the repository. This fix the problem with
          # failed git fetch in release-plz when using GITHUB_TOKEN, which doesn't have permission
          # to fetch the repository.
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1.15.3
      - name: Run release-plz
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5.156
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

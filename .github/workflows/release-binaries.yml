name: Release Binaries
on:
  release:
    types: [created]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
permissions: {}
env:
  BIN_NAME: crawk
jobs:
  build:
    name: Binaries
    permissions:
      contents: write # For adding files to the releases.
    runs-on: ${{ matrix.os }}
    concurrency:
      group: release-builds-${{ github.ref }}-${{ matrix.target }}
      cancel-in-progress: false
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}
          fetch-depth: 0
          persist-credentials: false
      - name: Upload Rust binary to GitHub Release
        uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1.30.2
        env:
          # Override VERGEN_SYSINFO_USER which upload-rust-binary-action replaces
          # with VERGEN_IDEMPOTENT_OUTPUT via its internal VERGEN_IDEMPOTENT=1 flag.
          CRAWK_BUILD_USER: ${{ github.actor }}
        with:
          bin: ${{ env.BIN_NAME }}
          target: ${{ matrix.target }}
          archive: ${{ env.BIN_NAME }}-${{ matrix.target }}-${{ github.event.release.tag_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
  publish:
    name: Publish Release
    needs: [build]
    if: ${{ success() && github.event.release.draft }}
    permissions:
      contents: write # Required to publish the release.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: gh release edit "$TAG_NAME" --draft=false --repo "$REPO"

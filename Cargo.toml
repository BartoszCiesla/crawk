[package]
name = "crawk"
version = "0.1.0"
edition = "2024"
authors = ["Bartosz Cieśla <bartosz.ciesla@gmail.com>"]
repository = "https://github.com/BartoszCiesla/crawk"
homepage = "https://github.com/BartoszCiesla/crawk"
description = "Dependency crawler for Rust. It crawls so you don't have to untangle"
license = "Apache-2.0"

[dependencies]

[lints.rust]
unsafe_code = "deny"
unused_must_use = "deny"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
enum_glob_use = "deny"
pedantic = { level = "deny", priority = -1 }
nursery = { level = "deny", priority = -1 }
doc_markdown = "allow"
panic = "deny"

[profile.release]
opt-level = 'z'
lto = "fat"
codegen-units = 1
panic = 'abort'
strip = "symbols"

